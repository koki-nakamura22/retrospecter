name: Setup uv + Python
description: Install uv, restore the uv cache, set up Python, and sync the locked dev environment for a given project directory.

inputs:
  python-version:
    description: Python version to set up (matches actions/setup-python).
    required: true
  project-dir:
    description: Project root directory (relative to repo root) containing pyproject.toml + uv.lock.
    required: false
    default: .

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true
        cache-dependency-glob: ${{ inputs.project-dir }}/uv.lock

    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Restore uv cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/uv
        key: uv-${{ runner.os }}-py${{ inputs.python-version }}-${{ hashFiles(format('{0}/uv.lock', inputs.project-dir)) }}
        restore-keys: |
          uv-${{ runner.os }}-py${{ inputs.python-version }}-
          uv-${{ runner.os }}-

    - name: Sync locked dependencies
      shell: bash
      working-directory: ${{ inputs.project-dir }}
      run: uv sync --locked --all-extras --dev
